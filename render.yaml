services:
  - type: web
    name: sql-chatbot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python -m nltk.downloader punkt stopwords"
    startCommand: "gunicorn -w 1 -b 0.0.0.0:$PORT wsgi:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
